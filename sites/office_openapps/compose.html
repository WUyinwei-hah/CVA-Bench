<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northstar Calendar | Compose Invite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="compose">
  <div class="office-shell">
    <header class="office-nav">
      <div class="container office-nav-inner">
        <a class="office-brand" href="./index.html">
          <span class="office-brand-mark">NC</span>
          <span>Northstar Calendar</span>
        </a>
        <div class="office-nav-meta">
          <span id="office-status-chip" class="status-chip">Drafting invite</span>
        </div>
      </div>
    </header>

    <main class="container py-4 py-xl-5">
      <section class="row g-4 align-items-start">
        <div class="col-xl-8">
          <section class="calendar-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Compose invite</p>
                <h3>Quarterly budget review</h3>
              </div>
              <span class="panel-pill">Step 1 of 2</span>
            </div>

            <div class="form-grid">
              <label class="field">
                <span>Meeting title</span>
                <input id="meeting-title" type="text" value="Quarterly budget review" autocomplete="off">
              </label>
              <label class="field">
                <span>Date</span>
                <input id="meeting-date" type="text" value="Monday, April 6" autocomplete="off">
              </label>
              <label class="field">
                <span>Time</span>
                <input id="meeting-time" type="text" value="11:30 AM - 12:15 PM" autocomplete="off">
              </label>
              <label class="field">
                <span>Location</span>
                <input id="meeting-location" type="text" value="Room Meridian" autocomplete="off">
              </label>
              <label class="field field-full">
                <span>Attendees</span>
                <input id="meeting-attendees" type="text" value="Finance Leads, Planning Ops, Jordan Hale" autocomplete="off">
              </label>
              <label class="field field-full">
                <span>Agenda note</span>
                <textarea id="meeting-agenda" rows="4" autocomplete="off">Review budget changes, lock Monday approvals, confirm updated planning assumptions.</textarea>
              </label>
            </div>

            <div class="page-actions">
              <button id="continue-to-review" class="hero-primary" type="button">Review Invite</button>
            </div>
          </section>
        </div>

        <div class="col-xl-4">
          <aside class="sidebar-stack">
            <section class="sidebar-card">
              <div class="panel-head compact">
                <div>
                  <p class="eyebrow">Organizer</p>
                  <h3>Jordan Hale</h3>
                </div>
              </div>
              <div class="detail-list">
                <div class="detail-row"><span>Workspace</span><strong>Northstar Ops</strong></div>
                <div class="detail-row"><span>Invite type</span><strong>Internal review</strong></div>
                <div class="detail-row"><span>Visibility</span><strong>Workspace only</strong></div>
              </div>
            </section>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
