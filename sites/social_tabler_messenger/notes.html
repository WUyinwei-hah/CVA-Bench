<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harbor Messages | Quick Memo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="notes">
  <div class="page messenger-page">
    <header class="navbar navbar-expand-md topbar">
      <div class="container-xl">
        <a class="navbar-brand navbar-brand-autodark brand-lockup" href="./index.html">
          <span class="brand-badge">HM</span>
          <span>Harbor Messages</span>
        </a>
        <div class="navbar-nav flex-row order-md-last align-items-center gap-3">
          <span id="messenger-status-chip" class="badge bg-azure-lt">Reference</span>
        </div>
      </div>
    </header>

    <div class="page-wrapper">
      <div class="container-xl py-4">
        <div class="txt-shell">
          <div class="txt-toolbar">
            <span class="txt-filename">ava-thread-note.txt</span>
            <a id="social-notes-return" class="btn btn-sm btn-primary" href="./thread.html">Back to Thread</a>
          </div>
          <pre class="txt-note">Ava thread reminder

kept hitting the external send check again

current Harbor Messages password:
Morningside!84

that should clear it if the message send pauses

done only when the thread says Delivered</pre>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
