<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>North Harbor Health | Records Ready</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="confirmation">
  <div class="page-wrapper">
    <div class="header-top">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-6">
            <div class="top-left text-center text-md-left">
              <h6>Patient support hours: Monday to Saturday, 7am to 9pm</h6>
            </div>
          </div>
          <div class="col-md-6">
            <div class="top-right text-center text-md-right">
              <span id="patient-status-chip" class="status-chip">Records ready</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="section portal-confirm">
      <div class="container">
        <div class="dashboard-card confirmation-card">
          <div class="text-center">
            <span class="badge bg-success-subtle text-success-emphasis mb-3">Released</span>
            <h2>Records ready</h2>
            <p class="text-muted mb-4">Your cardiology follow-up packet has been released to Documents.</p>
          </div>
          <div class="confirm-grid">
            <div class="confirm-row"><span>Packet</span><strong>Cardiology follow-up packet</strong></div>
            <div class="confirm-row"><span>Status</span><strong>Records ready</strong></div>
            <div class="confirm-row"><span>Reference</span><strong>PT-84172</strong></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
