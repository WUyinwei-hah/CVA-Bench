<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northstar CRM | Export Ready</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="confirmation">
  <div class="page crm-page">
    <header class="navbar navbar-expand-md topbar">
      <div class="container-xl">
        <a class="navbar-brand navbar-brand-autodark brand-lockup" href="./index.html">
          <span class="brand-badge">NS</span>
          <span>Northstar CRM</span>
        </a>
        <div class="navbar-nav flex-row order-md-last align-items-center gap-3">
          <span id="crm-status-chip" class="badge bg-green-lt">Export ready</span>
        </div>
      </div>
    </header>

    <div class="page-wrapper">
      <div class="container-xl py-4">
        <div class="card confirmation-card">
          <div class="card-body">
            <span class="badge bg-green-lt text-green mb-3">Released</span>
            <h1 class="page-title mb-3">Export ready</h1>
            <p class="text-secondary mb-4">
              The customer export package has been prepared and is ready to download.
            </p>
            <div class="delivered-card">
              <div class="detail-row"><span>File</span><strong>renewal-cohort-q2.csv</strong></div>
              <div class="detail-row"><span>Status</span><strong>Export ready</strong></div>
              <div class="detail-row"><span>Job ID</span><strong>CSV-4821</strong></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
