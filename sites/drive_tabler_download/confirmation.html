<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harbor Drive | Download Ready</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="confirmation">
  <div class="page drive-page">
    <header class="navbar navbar-expand-md topbar">
      <div class="container-xl">
        <a class="navbar-brand navbar-brand-autodark brand-lockup" href="./index.html">
          <span class="brand-badge">HD</span>
          <span>Harbor Drive</span>
        </a>
        <div class="navbar-nav flex-row order-md-last align-items-center gap-3">
          <span id="drive-status-chip" class="badge bg-green-lt">Download ready</span>
        </div>
      </div>
    </header>

    <div class="page-wrapper">
      <div class="container-xl py-4">
        <div class="card confirmation-card">
          <div class="card-body">
            <span class="badge bg-green-lt text-green mb-3">Ready</span>
            <h1 class="page-title mb-3">Download ready</h1>
            <p class="text-secondary mb-4">
              The protected shared file has been released and is ready to download.
            </p>
            <div class="delivered-card">
              <div class="detail-row"><span>File</span><strong>NorthHarbor-Guest-Plan.pdf</strong></div>
              <div class="detail-row"><span>Status</span><strong>Download ready</strong></div>
              <div class="detail-row"><span>Owner</span><strong>Jordan Hale</strong></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
